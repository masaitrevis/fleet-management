auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# By default, Loki will send anonymous, but uniquely-identifiable usage and configuration
# analytics to Grafana Labs. These statistics are sent to https://stats.grafana.org
#
# Statistics help us better understand how Loki is used, and they indicate what platforms
# are most common and which features are most used.
# For more details on what's sent, look at the UsageReporter struct and the
# sendUsageStats function in loki/pkg/usagestats/stats.go.
# Reporting can be disabled by changing the report_interval to 0, or by setting
# the environment variable LOKI_REPORT_INTERVAL to 0.
analytics:
  reporting_enabled: false
