server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - json:
          source: attrs
          expressions:
            tag: tag
      - regex:
          source: tag
          expression: (?P<container_name>(?:[^|])*[^|])
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          container_name:
      - output:
          source: output

  - job_name: fleet_app
    static_configs:
      - targets:
          - localhost
        labels:
          job: fleet_app
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          format: RFC3339Nano
          source: time
      - output:
          source: log
