global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fleet-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'fleet_app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'fleet_db'
    static_configs:
      - targets: ['db-exporter:9187']
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'fleet_redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
